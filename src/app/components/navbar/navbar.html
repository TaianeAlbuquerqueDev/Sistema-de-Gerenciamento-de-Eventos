<!-- ===================== NAVBAR PRINCIPAL ===================== -->
<nav class="navbar navbar-expand-lg navbar-dark" style="background-color: #0f172a; border-bottom: 1px solid #1e293b;">
    <div class="container">
        <a class="navbar-brand fw-bold fs-5 d-flex align-items-center gap-2" href="#">
            <span style="background: #6366f1; border-radius: 8px; padding: 4px 10px; font-size: 0.85rem; letter-spacing: 0.05em;">EVENT IT</span>
            <!-- <span style="color: #e2e8f0; letter-spacing: 0.02em;">it</span> -->
        </a>
        <button class="navbar-toggler border-0" type="button" data-bs-toggle="collapse" data-bs-target="#navbarSupportedContent"
            aria-controls="navbarSupportedContent" aria-expanded="false" aria-label="Toggle navigation">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarSupportedContent">
            <ul class="navbar-nav ms-auto mb-2 mb-lg-0 align-items-lg-center gap-1">
                <li class="nav-item">
                    <a class="nav-link px-3 rounded-2" style="color: #94a3b8; font-size: 0.9rem;" [routerLink]="['/home']">Home</a>
                </li>
                @if (authService.isLoggedIn()) {
                <li class="nav-item">
                    <a class="nav-link px-3 rounded-2" style="color: #94a3b8; font-size: 0.9rem;"
                        [routerLink]="['/admin/events']" routerLinkActive="active fw-semibold">Dashboard</a>
                </li>
                <li class="nav-item ms-2">
                    <button class="btn btn-sm px-3 py-1 rounded-2"
                        style="background: transparent; border: 1px solid #ef4444; color: #f87171; font-size: 0.85rem;"
                        (click)="authService.logout()">Sair</button>
                </li>
                } @else {
                <li class="nav-item ms-2">
                    <a class="btn btn-sm px-4 py-1 rounded-2"
                        style="background: #6366f1; border: none; color: #fff; font-size: 0.85rem;"
                        [routerLink]="['/login']" routerLinkActive="active">Login</a>
                </li>
                }
            </ul>
        </div>
    </div>
</nav>
<div class="navbar-spacer"></div>
