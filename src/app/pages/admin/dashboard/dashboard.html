<!-- ===================== NAVBAR ADMIN ===================== -->
<nav class="navbar navbar-expand-lg navbar-dark" style="background-color: #0f172a; border-bottom: 1px solid #1e293b;">
    <div class="container-fluid px-4">

        <a class="navbar-brand fw-bold d-flex align-items-center gap-2" routerLink="/admin/events">
            <span style="background: #6366f1; border-radius: 8px; padding: 4px 10px; font-size: 0.8rem; letter-spacing: 0.05em;">⚙️ PAINEL ADMIN</span>
            <!-- <span style="color: #e2e8f0; font-size: 0.95rem;">Painel</span> -->
        </a>

        <button class="navbar-toggler border-0" type="button" data-bs-toggle="collapse" data-bs-target="#adminNav"
            aria-controls="adminNav" aria-expanded="false" aria-label="Toggle navigation">
            <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse" id="adminNav">
            <div class="d-flex align-items-center gap-2 ms-auto">
                <a [routerLink]="['/home']" routerLinkActive="active fw-semibold"
                    class="btn btn-sm rounded-2 px-3"
                    style="border: 1px solid #334155; color: #94a3b8; font-size: 0.85rem; background: transparent;">
                    ← Home
                </a>

                <a class="btn btn-sm rounded-2 px-3"
                    style="border: 1px solid #6366f1; color: #a5b4fc; font-size: 0.85rem; background: transparent;"
                    routerLink="/admin/events" routerLinkActive="active"
                    [routerLinkActiveOptions]="{ exact: true }">
                    Novo Evento
                </a>

                <button class="btn btn-sm rounded-2 px-3"
                    style="border: 1px solid #ef4444; color: #f87171; font-size: 0.85rem; background: transparent;"
                    (click)="auth.logout()">
                    Sair
                </button>
            </div>
        </div>

    </div>
</nav>

<div class="container-fluid py-4 px-4">
    <router-outlet />
</div>
