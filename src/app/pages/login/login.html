<div class="card vw-100 m-auto mt-5" style="max-width: 520px;">

    <div class="card-body p-4">

        <div class="text-center mb-4">
            <h2 class="card-title fw-bold">🎫 Event-It</h2>
            <p class="text-muted">Faça login para acessar o painel administrativo</p>
        </div>

        @if (errorMessage()) {
        <div class="alert alert-danger" role="alert">
            ⚠️ {{ errorMessage() }}
        </div>
        }

        <form [formGroup]="loginForm" (ngSubmit)="onSubmit()">

            <div class="mb-3">
                <label for="email" class="form-label">Email</label>
                <input type="email" name="email" id="email" class="form-control" formControlName="email" placeholder="Digite o seu email"
                    autocomplete="email" />
            </div>

            <div class="mb-3">
                <label for="senha" class="form-label">Senha</label>
                <input type="password" name="senha" id="senha" class="form-control" formControlName="password" placeholder="••••••••"
                    autocomplete="current-password" />
            </div>

            <div class="mb-3">
                <button type="submit" class="btn btn-primary w-100" [disabled]="loginForm.invalid || isLoading()">
                    @if (isLoading()) {
                    <span class="spinner-border spinner-border-sm me-2" role="status"></span>
                    Entrando…
                    } @else {
                    Entrar
                    }
                </button>
            </div>

        </form>
        <div class="text-center mt-3">
            <a [routerLink]="['/home']" routerLinkActive="active fw-semibold" class="text-muted small">← Voltar aos eventos</a>
        </div>

    </div>

</div>
