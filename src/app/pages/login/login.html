<div class="d-flex align-items-center justify-content-center" style="min-height: 85vh; background-color: #f8fafc;">
    <div class="card border-0 rounded-3 p-2" style="width: 100%; max-width: 440px; box-shadow: 0 4px 24px rgba(0,0,0,0.08);">

        <div class="card-body p-4">

            <div class="text-center mb-4">
                <div class="d-inline-flex align-items-center gap-2 mb-3">
                    <span style="background: #000000; border-radius: 10px; padding: 6px 14px; font-weight: 700; font-size: 1rem; letter-spacing: 0.06em; color: #fff;">🎫 EVENT IT</span>
                </div>
                <p class="mb-0" style="color: #64748b; font-size: 0.9rem;">Faça login para acessar o painel administrativo</p>
            </div>

            @if (errorMessage()) {
            <div class="alert rounded-2 border-0 mb-3" style="background: #fef2f2; color: #b91c1c; font-size: 0.875rem;" role="alert">
                ⚠️ {{ errorMessage() }}
            </div>
            }

            <form [formGroup]="loginForm" (ngSubmit)="onSubmit()">

                <div class="mb-3">
                    <label for="email" class="form-label fw-semibold" style="font-size: 0.875rem; color: #374151;">Email</label>
                    <input type="email" name="email" id="email"
                        class="form-control rounded-2"
                        style="border-color: #e2e8f0; font-size: 0.9rem; padding: 10px 14px; background: #f8fafc;"
                        formControlName="email" placeholder="seu@email.com" autocomplete="email" />
                </div>

                <div class="mb-4">
                    <label for="senha" class="form-label fw-semibold" style="font-size: 0.875rem; color: #374151;">Senha</label>
                    <input type="password" name="senha" id="senha"
                        class="form-control rounded-2"
                        style="border-color: #e2e8f0; font-size: 0.9rem; padding: 10px 14px; background: #f8fafc;"
                        formControlName="password" placeholder="••••••••" autocomplete="current-password" />
                </div>

                <button type="submit"
                    class="btn w-100 rounded-2 fw-semibold"
                    style="background: #6366f1; color: #fff; border: none; padding: 11px; font-size: 0.9rem; letter-spacing: 0.02em;"
                    [disabled]="loginForm.invalid || isLoading()">
                    @if (isLoading()) {
                    <span class="spinner-border spinner-border-sm me-2" role="status"></span>
                    Entrando…
                    } @else {
                    Entrar
                    }
                </button>

            </form>

            <div class="text-center mt-4">
                <a [routerLink]="['/home']" routerLinkActive="active fw-semibold"
                    style="color: #94a3b8; font-size: 0.82rem; text-decoration: none;">← Voltar aos eventos</a>
            </div>

        </div>

    </div>
</div>
